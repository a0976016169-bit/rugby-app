<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="觀音橄欖球">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.json">
<title>觀音高中橄欖球隊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--card:#161b22;--border:rgba(255,255,255,0.08);--text:#e6edf3;--muted:#7d8590;--hint:#2d333b;--green:#3fb950;--amber:#d29922;--orange:#db6d28;--red:#f85149;--accent:#1f6feb;--accent-bg:rgba(31,111,235,0.15);--accent2:#238636;--radius:12px;--radius-sm:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:15px;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
.header{padding:env(safe-area-inset-top,44px) 16px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.team-badge{display:flex;align-items:center;gap:10px;}
.badge-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.team-name{font-size:15px;font-weight:700;}
.team-sub{font-size:11px;color:var(--muted);margin-top:1px;font-family:'DM Mono',monospace;}
.today-chip{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);background:var(--bg3);padding:4px 10px;border-radius:20px;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:16px 16px 90px;}
.page.active{display:block;}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,17,23,0.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding:6px 0 max(6px,env(safe-area-inset-bottom));}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:10px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;padding:5px 0;transition:color 0.15s;}
.nav-btn.active{color:var(--accent);}
.nav-btn svg{width:20px;height:20px;}
.sec-head{margin-bottom:16px;}
.sec-title{font-size:17px;font-weight:700;}
.sec-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.card-label{font-size:11px;font-weight:500;letter-spacing:0.6px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
